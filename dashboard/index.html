<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GRANT Scan Dashboard</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 920px; margin: 32px auto; padding: 0 16px;
      line-height: 1.4;
    }
    h1 { margin: 0 0 8px; }
    button {
      padding: 12px 28px; font-size: 16px; cursor: pointer;
      border-radius: 6px; border: 1px solid #666; background: #f5f5f5;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      display: grid; grid-template-columns: 140px 1fr;
      gap: 8px 16px; margin: 20px 0; align-items: center;
    }
    .status b { color: #666; font-weight: 500; }
    progress { width: 100%; height: 24px; }
    img.heatmap {
      width: 100%; max-width: 720px;
      image-rendering: pixelated;
      border: 1px solid #ccc; background: #111;
    }
    #meshLinks { min-height: 1.5em; }
    .err { color: #c00; }
  </style>
</head>
<body>

  <h1>GRANT Scan Dashboard</h1>
  <p>Two-orientation scan with cross-over-table sweep pattern.</p>

  <button id="startBtn">Start Scan</button>

  <div class="status">
    <b>Phase</b>        <span id="phase">idle</span>
    <b>Scan ID</b>      <span id="scanId">—</span>
    <b>Progress</b>     <progress id="progress" value="0" max="100"></progress>
    <b>Frames</b>       <span id="frames">0 / 0</span>
    <b>Coverage</b>     <span id="coverage">0%</span>
    <b>Alignment fit</b><span id="fitness">—</span>
  </div>

  <h2>Live coverage heatmap</h2>
  <img class="heatmap" id="heatmap" alt="No captures yet">

  <h2>Result</h2>
  <p id="meshLinks">No mesh yet.</p>

  <script>
    const $ = (id) => document.getElementById(id);
    const startBtn = $("startBtn");

    startBtn.addEventListener("click", async () => {
      startBtn.disabled = true;
      try {
        const r = await fetch("/scan/start", { method: "POST" });
        if (!r.ok) {
          const t = await r.text();
          $("meshLinks").innerHTML = `<span class="err">Failed to start: ${t}</span>`;
          startBtn.disabled = false;
        }
      } catch (e) {
        $("meshLinks").innerHTML = `<span class="err">${e}</span>`;
        startBtn.disabled = false;
      }
    });

    async function poll() {
      try {
        const r = await fetch("/scan/status");
        if (!r.ok) return;
        const s = await r.json();

        $("phase").textContent = s.phase;
        $("scanId").textContent = s.scan_id || "—";
        const pct = s.total_frames_expected > 0
          ? Math.round(100 * s.frames_captured / s.total_frames_expected)
          : 0;
        $("progress").value = pct;
        $("frames").textContent = `${s.frames_captured} / ${s.total_frames_expected}`;
        $("coverage").textContent = `${Math.round((s.coverage_fraction || 0) * 100)}%`;
        $("fitness").textContent = s.alignment_fitness != null ? s.alignment_fitness.toFixed(2) : "—";

        // Refresh the heatmap when there's something to show
        if (s.frames_captured > 0) {
          $("heatmap").src = `/scan/heatmap?t=${Date.now()}`;
        }

        // Terminal states
        if (s.phase === "complete") {
          startBtn.disabled = false;
          let html = `<a href="/scan/mesh" download>Download mesh (.ply)</a>`;
          if (s.onshape_url) {
            html += ` &nbsp;·&nbsp; <a href="${s.onshape_url}" target="_blank" rel="noreferrer">Open in Onshape</a>`;
          }
          $("meshLinks").innerHTML = html;
        } else if (s.phase === "error") {
          startBtn.disabled = false;
          $("meshLinks").innerHTML = `<span class="err">Error: ${s.error || "unknown"}</span>`;
        }
      } catch (e) { /* ignore transient network errors */ }
    }

    setInterval(poll, 750);
    poll();
  </script>
</body>
</html>
